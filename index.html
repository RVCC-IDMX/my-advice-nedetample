<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>What Should I Listen To?</title>
    <link rel="stylesheet" href="src/css/style.css" />
  </head>
  <body>
    <header class="hero">
      <h1>What Should I Listen To?</h1>
      <p class="subtitle">
        Find a Deezer mix for your mood, then let Groq explain the picks.
      </p>
    </header>
    <main>
      <section class="preferences-card">
        <form id="preferences-form" autocomplete="off">
          <div class="form-group">
            <label for="request">Describe the vibe</label>
            <input
              id="request"
              name="request"
              type="text"
              maxlength="500"
              placeholder="late-night synth pop for a solo drive"
            />
            <p class="form-help">Optional. Keep it under 500 characters.</p>
          </div>
          <div class="form-group">
            <label for="time">Time available</label>
            <select id="time" name="time">
              <option value="">Any amount</option>
              <option value="180">3 minutes or less</option>
              <option value="300">5 minutes or less</option>
              <option value="480">8 minutes or less</option>
              <option value="900">15 minutes or less</option>
            </select>
          </div>
          <div class="form-group">
            <label for="genre">Genre</label>
            <select id="genre" name="genre">
              <option value="">Any genre</option>
              <option value="rock">Rock</option>
              <option value="pop">Pop</option>
              <option value="jazz">Jazz</option>
              <option value="indie">Indie</option>
              <option value="rap">Rap</option>
              <option value="classical">Classical</option>
            </select>
          </div>
          <div class="form-group">
            <label for="rank">Popularity</label>
            <select id="rank" name="rank">
              <option value="">Any popularity</option>
              <option value="very-popular">Very popular</option>
              <option value="somewhat-popular">Somewhat popular</option>
              <option value="niche">Niche</option>
              <option value="unheard">Unheard of</option>
            </select>
          </div>
          <!-- Activity filter removed for Deezer API -->
          <div class="form-actions">
            <button type="submit" id="get-recs">Get Recommendations</button>
            <button type="button" id="random-pick">Spin the Record</button>
          </div>
        </form>
      </section>
      <section class="results-section">
        <h2>Recommendations</h2>
        <div id="narration" aria-live="polite"></div>
        <div id="random-pick-area" aria-live="polite"></div>
        <div id="recommendations" aria-live="polite"></div>
      </section>
      <!-- Detail view container for SPA -->
      <div id="detail-view" class="hidden" aria-live="polite"></div>
    </main>
    <footer>
      <p>
        Made with <span aria-label="vinyl record" role="img">🎵</span> for music
        lovers
      </p>
    </footer>
    <script type="module" src="src/js/app.js"></script>
  </body>
</html>
